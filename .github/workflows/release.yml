name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: bnn-code
            asset_name: bnn-code-linux-amd64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: bnn-code
            asset_name: bnn-code-linux-amd64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: bnn-code
            asset_name: bnn-code-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: bnn-code
            asset_name: bnn-code-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: bnn-code.exe
            asset_name: bnn-code-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.asset_name }}.tar.gz -C target/${{ matrix.target }}/release ${{ matrix.artifact_name }}
          sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.artifact_name }} -DestinationPath ${{ matrix.asset_name }}.zip
          Get-FileHash ${{ matrix.asset_name }}.zip -Algorithm SHA256 > ${{ matrix.asset_name }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.*
          retention-days: 7

  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: bnn-code-linux-amd64
          path: ./artifacts

      - name: Extract binary
        run: |
          tar -xzf artifacts/bnn-code-linux-amd64.tar.gz
          mkdir -p dist
          mv bnn-code dist/bnn

      - name: Build .deb package
        run: |
          chmod +x build-deb.sh 2>/dev/null || true
          # Create minimal .deb structure
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/local/bin
          cp dist/bnn deb/usr/local/bin/
          cat > deb/DEBIAN/control << 'EOF'
          Package: bnn-code
          Version: 0.1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: BNN Code Team <team@bnn-code.dev>
          Description: Terminal-native AI coding agent powered by Binarized Neural Networks
           BNN Code is a terminal-based AI coding assistant that helps you understand,
           refactor, and test your codebase using Binarized Neural Networks.
          EOF
          dpkg-deb --build deb bnn-code_0.1.0_amd64.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bnn-code-deb
          path: bnn-code_*.deb
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, build-deb]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
